<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WPF-to-Blazor API Documentation</title>
  <meta name="description" content="API documentation for the WPF-to-Blazor migration tool"/>
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="redoc-container"></div>
  <script src="https://cdn.redoc.ly/redoc/v2.1.5/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init('./openapi.json', {
      theme: {
        colors: {
          primary: { main: '#6366f1' }
        },
        typography: {
          fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
          headings: { fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' },
          fontSize: '15px',
          code: { fontSize: '13px' }
        },
        sidebar: {
          width: '280px',
          backgroundColor: '#1e1b4b',
          textColor: '#c7d2fe',
          activeTextColor: '#ffffff',
          groupItems: { activeBackgroundColor: '#312e81', activeTextColor: '#ffffff' }
        },
        rightPanel: {
          backgroundColor: '#1e293b',
          textColor: '#e2e8f0'
        }
      },
      scrollYOffset: 0,
      hideDownloadButton: false,
      expandResponses: '200,201,202',
      jsonSampleExpandLevel: 2,
      sortOperationsAlphabetically: false,
      pathInMiddlePanel: true,
      requiredPropsFirst: true,
      showExtensions: false,
      noAutoAuth: false,
      hideHostname: false,
      nativeScrollbars: true
    }, document.getElementById('redoc-container'));
  </script>
</body>
</html>
